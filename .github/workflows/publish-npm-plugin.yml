name: Publish npm plugin

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Package version to publish
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: self-hosted
    env:
      NODE22_BIN: /home/agent/actions-runner-w3kits-plugin-marketplace-2/_work/_tool/node/22.12.0/x64/bin
    steps:
      - uses: actions/checkout@v4
      - name: Use host Node 22
        run: |
          set -euo pipefail
          echo "$NODE22_BIN" >> "$GITHUB_PATH"
          "$NODE22_BIN/node" --version
          "$NODE22_BIN/npm" --version
          "$NODE22_BIN/corepack" pnpm --version
          "$NODE22_BIN/npm" config set registry https://registry.npmjs.org
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --filter @open-design/web test tests/w3kits-daemon-shim.test.ts
      - run: corepack pnpm build
      - name: Verify package version
        run: |
          set -euo pipefail
          actual="$(node -p "require('./package.json').version")"
          test "$actual" = "${{ inputs.expected_version }}"
      - name: Verify npm package contents
        run: npm pack --dry-run
      - name: Publish to npm
        run: npm publish --provenance --access public
